<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Logos Travels – Lijo Jose</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --lb-50:#f0f7ff;
  --lb-100:#daeeff;
  --lb-200:#b8dcff;
  --lb-400:#5aaeff;
  --lb-500:#2e95f5;
  --lb-600:#1478d4;
  --lb-700:#0d5faa;
  --lb-800:#094d8c;
  --lb-900:#062f5a;
  --white:#ffffff;
  --text-dark:#061830;
  --text-muted:#7aa0c0;
  --border:#c8e0f5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  min-height:100vh;
  background:linear-gradient(145deg,#03111e 0%,#071e38 55%,#030d1a 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;
  padding:32px 16px;
}

.card{
  width:360px;
  background:var(--white);
  border-radius:26px;
  overflow:hidden;
  box-shadow:
    0 50px 120px rgba(0,0,0,0.65),
    0 0 0 1px rgba(90,174,255,0.12),
    0 8px 40px rgba(20,120,212,0.22);
  animation:rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes rise{
  from{opacity:0;transform:translateY(44px) scale(0.94)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── HERO ── */
.hero{
  position:relative;
  height:240px;
  overflow:hidden;
}

/* highway image drawn directly via canvas — no external dependency */
.hero-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

/* light-blue gradient overlay at top matching LJ avatar colour */
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(9,77,140,0.82) 0%,
    rgba(9,77,140,0.55) 30%,
    rgba(4,20,50,0.70) 68%,
    rgba(2,10,30,0.98) 100%
  );
}

/* thin accent stripe */
.hero-stripe{
  position:absolute;top:0;left:0;right:0;height:3px;z-index:5;
  background:linear-gradient(90deg,
    transparent 0%,var(--lb-600) 18%,
    var(--lb-400) 50%,var(--lb-600) 82%,transparent 100%);
}
.checker{
  position:absolute;top:3px;left:0;right:0;height:8px;z-index:4;
  background:repeating-linear-gradient(90deg,
    rgba(255,255,255,0.65) 0,rgba(255,255,255,0.65) 8px,
    rgba(255,255,255,0.05) 8px,rgba(255,255,255,0.05) 16px);
}

.hero-content{
  position:relative;z-index:3;
  padding:18px 24px 22px;
  height:100%;
  display:flex;flex-direction:column;justify-content:space-between;
}

.top-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;
}
/* cross only — no text brand name */
.cross-emblem{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.28);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.badge-247{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.28);
  color:var(--white);font-size:10px;font-weight:600;
  letter-spacing:0.14em;padding:5px 14px;border-radius:20px;
}

/* BRAND — LOGOS TRAVELS in caps, big */
.brand-block{padding-bottom:2px;}
.brand-name{
  font-family:'DM Sans',sans-serif;
  font-size:36px;font-weight:600;color:var(--white);
  line-height:1;letter-spacing:0.14em;
  text-transform:uppercase;
  text-shadow:0 4px 32px rgba(0,0,0,0.5);
}
.brand-tagline{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:12.5px;font-style:italic;font-weight:300;
  color:rgba(184,220,255,0.55);
  letter-spacing:0.08em;margin-top:7px;
}
.brand-kerala{
  display:block;
  font-family:'DM Sans',sans-serif;
  font-size:9.5px;font-weight:400;
  letter-spacing:0.32em;text-transform:uppercase;
  color:rgba(184,220,255,0.4);
  margin-top:5px;
}

/* ── STRIPE DIVIDER ── */
.stripe-divider{
  height:3px;
  background:linear-gradient(90deg,
    var(--lb-50) 0%,var(--lb-500) 28%,
    var(--lb-400) 50%,var(--lb-500) 72%,var(--lb-50) 100%);
}

/* ── CAR SECTION ── */
.car-section{
  background:linear-gradient(180deg,#020c22 0%,#010610 100%);
  padding:14px 0 10px;position:relative;
}

/* ── SERVICES ── */
.services{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:var(--white);border-bottom:1px solid var(--border);
}
.svc{
  display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:14px 6px 12px;
  border-right:1px solid var(--border);
  transition:background 0.2s;cursor:default;
}
.svc:last-child{border-right:none;}
.svc:hover{background:var(--lb-50);}
.svc-icon{
  width:38px;height:38px;border-radius:10px;
  background:var(--lb-50);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s,background 0.2s;
}
.svc:hover .svc-icon{background:var(--lb-100);transform:scale(1.08);}
.svc-title{font-size:10px;font-weight:600;color:var(--lb-700);text-align:center;letter-spacing:0.04em;line-height:1.3;}
.svc-sub{font-size:8.5px;color:var(--text-muted);text-align:center;line-height:1.3;}

/* ── BODY ── */
.body{padding:18px 22px 22px;background:var(--white);}
.phone-block{
  background:var(--lb-50);border:1px solid var(--lb-100);
  border-radius:14px;padding:13px 18px 14px;
  margin-bottom:14px;position:relative;overflow:hidden;
}
.phone-block::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--lb-500),var(--lb-400));
  border-radius:3px 0 0 3px;
}
.phone-lbl{font-size:9px;color:var(--text-muted);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:4px;}
.phone-num{
  font-family:'DM Sans',sans-serif;
  font-size:28px;font-weight:600;color:var(--text-dark);
  letter-spacing:0.03em;line-height:1;
}
.phone-num span{color:var(--lb-600);}

.divider{height:1px;background:var(--border);margin:14px 0;}
.name-row{display:flex;align-items:center;justify-content:space-between;}
.name-block .name{font-size:15px;font-weight:600;color:var(--lb-700);letter-spacing:0.04em;}
.name-block .role{font-size:10.5px;color:var(--text-muted);margin-top:2px;}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--lb-800),var(--lb-600));
  display:flex;align-items:center;justify-content:center;
  font-size:13.5px;font-weight:600;color:#fff;letter-spacing:0.04em;
  border:2px solid var(--lb-100);
  box-shadow:0 4px 16px rgba(20,120,212,0.28);
}

/* ── BUTTONS ── */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.btn{
  display:flex;align-items:center;justify-content:center;
  gap:7px;padding:13px 0;border-radius:12px;
  font-size:12.5px;font-weight:600;letter-spacing:0.04em;
  cursor:pointer;text-decoration:none;border:none;
  font-family:'DM Sans',sans-serif;
  transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;
}
.btn:active{transform:scale(0.96);}
.btn-call{
  background:linear-gradient(135deg,var(--lb-800),var(--lb-600));
  color:var(--white);box-shadow:0 6px 20px rgba(20,120,212,0.38);
}
.btn-call:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 10px 28px rgba(20,120,212,0.52);}
.btn-wa{background:#f0faf5;color:#128C7E;border:1.5px solid #b8e4d0;}
.btn-wa:hover{background:#e0f5ec;transform:translateY(-1px);}
.btn-save{
  grid-column:1/-1;background:var(--lb-50);
  color:var(--lb-700);border:1.5px solid var(--lb-200);font-size:12px;
}
.btn-save:hover{background:var(--lb-100);transform:translateY(-1px);}

/* ── FOOTER ── */
.footer-bar{
  background:var(--lb-900);padding:11px 20px;
  display:flex;justify-content:center;align-items:center;gap:8px;
  border-top:1px solid rgba(90,174,255,0.1);
}
.footer-dot{width:3px;height:3px;border-radius:50%;background:var(--lb-400);opacity:0.4;}
.footer-text{font-size:9px;color:rgba(184,220,255,0.3);letter-spacing:0.18em;text-transform:uppercase;}
</style>

<script>
/* Draw highway light trails directly on canvas — no external image needed */
function drawHighway(){
  const canvas=document.getElementById('heroCanvas');
  if(!canvas)return;
  const W=canvas.width=360,H=canvas.height=240;
  const ctx=canvas.getContext('2d');

  /* sky — deep midnight blue */
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#020d22');
  sky.addColorStop(0.5,'#041530');
  sky.addColorStop(1,'#020a1a');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  /* horizon glow */
  const hglow=ctx.createRadialGradient(W/2,H*0.52,0,W/2,H*0.52,W*0.55);
  hglow.addColorStop(0,'rgba(20,120,212,0.28)');
  hglow.addColorStop(0.5,'rgba(20,120,212,0.08)');
  hglow.addColorStop(1,'transparent');
  ctx.fillStyle=hglow;
  ctx.fillRect(0,0,W,H);

  /* road surface */
  const rp=new Path2D();
  rp.moveTo(W*0.1,H);rp.lineTo(W*0.9,H);
  rp.lineTo(W*0.58,H*0.46);rp.lineTo(W*0.42,H*0.46);rp.closePath();
  const road=ctx.createLinearGradient(0,H*0.46,0,H);
  road.addColorStop(0,'#0a1428');
  road.addColorStop(1,'#070e1e');
  ctx.fillStyle=road;ctx.fill(rp);

  /* road edge lines */
  ctx.save();
  const elg=ctx.createLinearGradient(0,H*0.5,0,H);
  elg.addColorStop(0,'rgba(90,174,255,0.0)');
  elg.addColorStop(0.3,'rgba(90,174,255,0.3)');
  elg.addColorStop(1,'rgba(90,174,255,0.5)');
  ctx.strokeStyle=elg;ctx.lineWidth=1.5;
  /* left edge */
  ctx.beginPath();ctx.moveTo(W*0.42,H*0.46);ctx.lineTo(W*0.1,H);ctx.stroke();
  /* right edge */
  ctx.beginPath();ctx.moveTo(W*0.58,H*0.46);ctx.lineTo(W*0.9,H);ctx.stroke();
  ctx.restore();

  /* light trails — white/yellow lines converging to vanishing point */
  const vx=W*0.5, vy=H*0.44;
  const trails=[
    {x1:W*0.22,y1:H,x2:vx,y2:vy,w:18,col:'rgba(255,220,80,0.55)'},
    {x1:W*0.30,y1:H,x2:vx,y2:vy,w:10,col:'rgba(255,200,60,0.4)'},
    {x1:W*0.72,y1:H,x2:vx,y2:vy,w:20,col:'rgba(220,240,255,0.55)'},
    {x1:W*0.80,y1:H,x2:vx,y2:vy,w:12,col:'rgba(200,230,255,0.4)'},
    {x1:W*0.38,y1:H,x2:vx,y2:vy,w:6,col:'rgba(255,240,180,0.3)'},
    {x1:W*0.62,y1:H,x2:vx,y2:vy,w:6,col:'rgba(200,220,255,0.3)'},
  ];
  trails.forEach(t=>{
    const g=ctx.createLinearGradient(t.x2,t.y2,t.x1,t.y1);
    g.addColorStop(0,'transparent');
    g.addColorStop(0.3,t.col);
    g.addColorStop(1,t.col.replace(/[\d.]+\)$/,'0.05)'));
    ctx.save();
    ctx.strokeStyle=g;
    ctx.lineWidth=t.w;
    ctx.lineCap='round';
    ctx.globalCompositeOperation='screen';
    ctx.beginPath();ctx.moveTo(t.x2,t.y2);ctx.lineTo(t.x1,t.y1);ctx.stroke();
    ctx.restore();
  });

  /* centre dashed divider */
  const dashCount=10;
  for(let i=0;i<dashCount;i++){
    const t0=i/dashCount, t1=(i+0.45)/dashCount;
    const x0=vx+(W*0.5-vx)*t0, y0=vy+(H-vy)*t0;
    const x1=vx+(W*0.5-vx)*t1, y1=vy+(H-vy)*t1;
    const g=ctx.createLinearGradient(x0,y0,x1,y1);
    g.addColorStop(0,'rgba(255,255,255,0.08)');
    g.addColorStop(1,'rgba(255,255,255,0.32)');
    ctx.save();ctx.strokeStyle=g;
    ctx.lineWidth=2+(1-t0)*2;ctx.lineCap='round';
    ctx.globalCompositeOperation='screen';
    ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    ctx.restore();
  }

  /* distant city glow on horizon */
  const cg=ctx.createRadialGradient(W/2,H*0.44,0,W/2,H*0.44,80);
  cg.addColorStop(0,'rgba(90,174,255,0.18)');
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);

  /* stars */
  ctx.save();ctx.globalCompositeOperation='screen';
  for(let i=0;i<60;i++){
    const sx=Math.random()*W, sy=Math.random()*H*0.42;
    const sr=Math.random()*1.2;
    const sa=Math.random()*0.6+0.1;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,220,255,${sa})`;ctx.fill();
  }
  ctx.restore();
}

window.addEventListener('load',drawHighway);

function saveContact(){
  const v=`BEGIN:VCARD\nVERSION:3.0\nFN:Lijo Jose\nORG:Logos Travels\nTEL;TYPE=CELL:+918156899203\nTITLE:Professional Driver\nNOTE:Airport Pickup & Drop · Railway Station · Local Rides · 24/7 · Kerala · Your trusted ride, always\nEND:VCARD`;
  const b=new Blob([v],{type:'text/vcard'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download='lijo_jose_logos_travels.vcf';
  a.click();URL.revokeObjectURL(u);
}
